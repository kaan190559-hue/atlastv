<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      id="atlas-viewport"
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <script>
      (function () {
        function getViewport() {
          return {
            width: window.visualViewport && window.visualViewport.width ? window.visualViewport.width : window.innerWidth || 1920,
            height: window.visualViewport && window.visualViewport.height ? window.visualViewport.height : window.innerHeight || 1080,
          }
        }

        function detectDeviceProfile() {
          var ua = window.navigator && window.navigator.userAgent ? window.navigator.userAgent : ''
          var isTvBrowser = /smart-tv|smarttv|hbbtv|netcast|webos|tizen|appletv|googletv|android tv|bravia|viera|aquos|roku|aft/i.test(ua)
          var isNarrowScreen = window.matchMedia && window.matchMedia('(max-width: 760px)').matches

          if (isTvBrowser) return 'tv'
          if (isNarrowScreen) return 'phone'
          return 'pc'
        }

        function applyStageScale() {
          var profile = detectDeviceProfile()
          var isPhone = profile === 'phone'
          var isTv = profile === 'tv'

          document.documentElement.setAttribute('data-device-type', profile)
          document.documentElement.setAttribute('data-screen-orientation', isPhone ? 'portrait' : 'landscape')
          document.documentElement.setAttribute('data-tv-performance', isTv ? 'true' : 'false')

          if (isTv) {
            document.documentElement.style.setProperty('--rail-poster-width', 'clamp(210px, 13vw, 260px)')
            document.documentElement.style.setProperty('--rail-wide-width', 'clamp(330px, 22vw, 440px)')
            document.documentElement.style.setProperty('--rail-channel-width', 'clamp(250px, 16vw, 320px)')
            document.documentElement.style.setProperty('--rail-circle-width', 'clamp(150px, 9vw, 190px)')
            document.documentElement.style.setProperty('--home-poster-width', 'clamp(170px, 10vw, 210px)')
            document.documentElement.style.setProperty('--home-wide-width', 'clamp(280px, 18vw, 350px)')
            document.documentElement.style.setProperty('--home-channel-width', 'clamp(220px, 14vw, 280px)')
            document.documentElement.style.setProperty('--home-circle-width', 'clamp(124px, 8vw, 158px)')
            return
          }

          if (isPhone) {
            document.documentElement.style.setProperty('--rail-poster-width', 'clamp(138px, 42vw, 170px)')
            document.documentElement.style.setProperty('--rail-wide-width', 'clamp(220px, 66vw, 280px)')
            document.documentElement.style.setProperty('--rail-channel-width', 'clamp(190px, 58vw, 250px)')
            document.documentElement.style.setProperty('--rail-circle-width', 'clamp(94px, 30vw, 124px)')
            document.documentElement.style.setProperty('--home-poster-width', 'clamp(128px, 39vw, 158px)')
            document.documentElement.style.setProperty('--home-wide-width', 'clamp(210px, 64vw, 260px)')
            document.documentElement.style.setProperty('--home-channel-width', 'clamp(180px, 55vw, 230px)')
            document.documentElement.style.setProperty('--home-circle-width', 'clamp(88px, 28vw, 112px)')
            return
          }

          document.documentElement.style.setProperty('--rail-poster-width', 'clamp(178px, 14vw, 230px)')
          document.documentElement.style.setProperty('--rail-wide-width', 'clamp(290px, 23vw, 390px)')
          document.documentElement.style.setProperty('--rail-channel-width', 'clamp(220px, 17vw, 280px)')
          document.documentElement.style.setProperty('--rail-circle-width', 'clamp(130px, 10vw, 168px)')
          document.documentElement.style.setProperty('--home-poster-width', 'clamp(150px, 12vw, 185px)')
          document.documentElement.style.setProperty('--home-wide-width', 'clamp(250px, 20vw, 320px)')
          document.documentElement.style.setProperty('--home-channel-width', 'clamp(200px, 16vw, 250px)')
          document.documentElement.style.setProperty('--home-circle-width', 'clamp(112px, 9vw, 140px)')
        }

        applyStageScale()
        window.addEventListener('resize', applyStageScale)
        window.addEventListener('orientationchange', function () {
          window.setTimeout(applyStageScale, 120)
        })
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', applyStageScale)
        }
      })()
    </script>
    <title>localde-bir-uygulama-kuracag-z-sonra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
