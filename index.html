<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta id="atlas-viewport" name="viewport" content="width=1920, viewport-fit=cover" />
    <script>
      (function () {
        var designWidth = 1920
        var meta = document.getElementById('atlas-viewport')
        if (!meta) return
        var isCoarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches
        if (!isCoarse) return
        var screenWidth = Math.max(window.screen && window.screen.width ? window.screen.width : 0, window.innerWidth || 0)
        var scale = Math.min(1, Math.max(0.25, screenWidth / designWidth))
        meta.setAttribute(
          'content',
          'width=' +
            designWidth +
            ', initial-scale=' +
            scale +
            ', minimum-scale=' +
            scale +
            ', maximum-scale=' +
            scale +
            ', user-scalable=no, viewport-fit=cover',
        )
      })()
    </script>
    <title>localde-bir-uygulama-kuracag-z-sonra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
