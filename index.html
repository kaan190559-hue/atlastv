<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      id="atlas-viewport"
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <script>
      (function () {
        function getViewport() {
          return {
            width: window.visualViewport && window.visualViewport.width ? window.visualViewport.width : window.innerWidth || 1920,
            height: window.visualViewport && window.visualViewport.height ? window.visualViewport.height : window.innerHeight || 1080,
          }
        }

        function detectDeviceProfile() {
          var ua = window.navigator && window.navigator.userAgent ? window.navigator.userAgent : ''
          var hasCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches
          var viewport = getViewport()
          var isTvBrowser = /smart-tv|smarttv|hbbtv|netcast|webos|tizen|appletv|googletv|android tv|bravia|viera|aquos|roku|aft/i.test(ua)
          var isNarrowScreen = window.matchMedia && window.matchMedia('(max-width: 760px)').matches
          var isPortraitPhone = hasCoarsePointer && Math.min(viewport.width, viewport.height) <= 760

          if (isTvBrowser) return 'tv'
          if (isNarrowScreen || isPortraitPhone) return 'phone'
          return 'pc'
        }

        function applyStageScale() {
          var profile = detectDeviceProfile()
          var isPhone = profile === 'phone'
          var isTv = profile === 'tv'

          document.documentElement.setAttribute('data-device-type', profile)
          document.documentElement.setAttribute('data-screen-orientation', isPhone ? 'portrait' : 'landscape')
          document.documentElement.setAttribute('data-tv-performance', isTv ? 'true' : 'false')
          document.documentElement.style.setProperty('--atlas-stage-scale', '1')
          document.documentElement.style.setProperty('--atlas-stage-width', '100%')
          document.documentElement.style.setProperty('--atlas-stage-height', '100svh')
          document.documentElement.style.setProperty('--atlas-root-width', '100%')
          document.documentElement.style.setProperty('--atlas-root-height', '100svh')
          document.documentElement.setAttribute('data-atlas-stage-scale', '1.000')

          if (isTv) {
            document.documentElement.style.setProperty('--rail-poster-width', 'clamp(220px, 14vw, 285px)')
            document.documentElement.style.setProperty('--rail-wide-width', 'clamp(360px, 24vw, 500px)')
            document.documentElement.style.setProperty('--rail-channel-width', 'clamp(280px, 18vw, 350px)')
            document.documentElement.style.setProperty('--rail-circle-width', 'clamp(164px, 10vw, 220px)')
            document.documentElement.style.setProperty('--home-poster-width', 'clamp(180px, 11vw, 225px)')
            document.documentElement.style.setProperty('--home-wide-width', 'clamp(300px, 20vw, 380px)')
            document.documentElement.style.setProperty('--home-channel-width', 'clamp(240px, 16vw, 310px)')
            document.documentElement.style.setProperty('--home-circle-width', 'clamp(140px, 8vw, 180px)')
            return
          }

          if (isPhone) {
            document.documentElement.style.setProperty('--rail-poster-width', 'clamp(156px, 58vw, 220px)')
            document.documentElement.style.setProperty('--rail-wide-width', 'clamp(240px, 78vw, 330px)')
            document.documentElement.style.setProperty('--rail-channel-width', 'clamp(220px, 72vw, 300px)')
            document.documentElement.style.setProperty('--rail-circle-width', 'clamp(118px, 38vw, 158px)')
            document.documentElement.style.setProperty('--home-poster-width', 'clamp(148px, 52vw, 196px)')
            document.documentElement.style.setProperty('--home-wide-width', 'clamp(230px, 76vw, 320px)')
            document.documentElement.style.setProperty('--home-channel-width', 'clamp(210px, 68vw, 270px)')
            document.documentElement.style.setProperty('--home-circle-width', 'clamp(112px, 34vw, 150px)')
            return
          }

          document.documentElement.style.setProperty('--rail-poster-width', 'clamp(190px, 16vw, 253px)')
          document.documentElement.style.setProperty('--rail-wide-width', 'clamp(310px, 26vw, 430px)')
          document.documentElement.style.setProperty('--rail-channel-width', 'clamp(240px, 20vw, 308px)')
          document.documentElement.style.setProperty('--rail-circle-width', 'clamp(150px, 12vw, 202px)')
          document.documentElement.style.setProperty('--home-poster-width', 'clamp(165px, 13vw, 205px)')
          document.documentElement.style.setProperty('--home-wide-width', 'clamp(280px, 23vw, 350px)')
          document.documentElement.style.setProperty('--home-channel-width', 'clamp(220px, 18vw, 280px)')
          document.documentElement.style.setProperty('--home-circle-width', 'clamp(132px, 10vw, 168px)')
        }

        applyStageScale()
        window.addEventListener('resize', applyStageScale)
        window.addEventListener('orientationchange', function () {
          window.setTimeout(applyStageScale, 120)
        })
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', applyStageScale)
        }
      })()
    </script>
    <title>localde-bir-uygulama-kuracag-z-sonra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
