<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      id="atlas-viewport"
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <script>
      (function () {
        var designWidth = 1920
        function applyStageScale() {
          var viewportWidth =
            window.visualViewport && window.visualViewport.width ? window.visualViewport.width : window.innerWidth || designWidth
          var viewportHeight =
            window.visualViewport && window.visualViewport.height ? window.visualViewport.height : window.innerHeight || 1080
          var scale = Math.min(1, Math.max(0.16, viewportWidth / designWidth))
          var stageWidth = designWidth
          var stageHeight = Math.ceil(viewportHeight / scale)
          var rootWidth = Math.ceil(stageWidth * scale)

          document.documentElement.style.setProperty('--atlas-stage-scale', String(scale))
          document.documentElement.style.setProperty('--atlas-stage-width', stageWidth + 'px')
          document.documentElement.style.setProperty('--atlas-stage-height', stageHeight + 'px')
          document.documentElement.style.setProperty('--atlas-root-width', rootWidth + 'px')
          document.documentElement.setAttribute('data-atlas-stage-scale', scale.toFixed(3))
        }

        applyStageScale()
        window.addEventListener('resize', applyStageScale)
        window.addEventListener('orientationchange', function () {
          window.setTimeout(applyStageScale, 120)
        })
        if (window.visualViewport) {
          window.visualViewport.addEventListener('resize', applyStageScale)
        }
      })()
    </script>
    <title>localde-bir-uygulama-kuracag-z-sonra</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
